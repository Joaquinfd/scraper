name: Daily scraper

on:
  schedule:
    - cron: '0 11 * * *'  # 8:00 AM Santiago (UTC-3)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python main.py --db --no-csv --no-jsonl
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
